version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: assitify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: assitify
      POSTGRES_USER: assitify
      POSTGRES_PASSWORD: assitify123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: assitify-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: assitify-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
